<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OCI Capacity Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">OCI Compute</p>
          <h1>Capacity Report</h1>
        </div>
        <div class="run-state" id="runState">Idle</div>
      </header>

      <section class="controls" aria-label="Report controls">
        <div class="control-block">
          <label>Shape Family</label>
          <div class="segmented" role="group" aria-label="Shape family">
            <button class="segment is-active" type="button" data-family="E5">E5</button>
            <button class="segment" type="button" data-family="E6">E6</button>
          </div>
        </div>

        <div class="control-block region-control">
          <div class="control-row">
            <label>Subscribed Regions</label>
            <output id="regionsValue">Loading</output>
          </div>
          <div id="regionChips" class="region-chips" aria-label="Subscribed OCI regions"></div>
          <button id="regionToggle" class="subtle-action" type="button">Select all</button>
        </div>

        <div class="control-block range-control">
          <div class="control-row">
            <label for="ocpus">OCPUs</label>
            <output id="ocpusValue" for="ocpus">1</output>
          </div>
          <input id="ocpus" type="range" min="1" max="256" step="1" value="1">
        </div>

        <div class="control-block range-control">
          <div class="control-row">
            <label for="memoryGbs">RAM GB</label>
            <output id="memoryValue" for="memoryGbs">16</output>
          </div>
          <input id="memoryGbs" type="range" min="1" max="4096" step="1" value="16">
        </div>

        <button id="runReport" class="primary-action" type="button">Run Report</button>
      </section>

      <section class="summary-grid" aria-label="Summary">
        <article class="metric metric-available">
          <span>Available</span>
          <strong id="availableCount">0</strong>
        </article>
        <article class="metric metric-capacity">
          <span>Out of Host Capacity</span>
          <strong id="capacityCount">0</strong>
        </article>
        <article class="metric metric-error">
          <span>Errors</span>
          <strong id="errorCount">0</strong>
        </article>
        <article class="metric">
          <span>Regions</span>
          <strong id="regionCount">0</strong>
        </article>
      </section>

      <section class="visual-panel">
        <div class="panel-header">
          <div>
            <h2>Region View</h2>
            <p id="reportMeta">Select a family and run the report.</p>
          </div>
        </div>
        <div id="regions" class="regions empty">
          <div class="empty-state">
            <strong>No report loaded</strong>
            <span id="progressText">Results will appear here.</span>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
